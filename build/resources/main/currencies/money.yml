name: "money"
displayName: "&6Money"
symbol: ""

starting-balance: 1000
max-balance: 1000000

can-be-negative: false

commands:
  command: "money"
  pay:
    enabled: true
    usage: "&cUsa: /{command} pay <player> <amount>"
    permission: "money.pay"
    description: "Pay another player a specified amount of money."
  balance:
      enabled: true
      usage: "&cUsa: /{command} balance [player]"
      permission: "money.balance"
      description: "Check your balance or another player's balance."
      settings:
        allow-check-others: true
  admin:
    enabled: true
    permission: "money.admin"
    usage: "&cUsa: /{command} admin <check|give|giveall|remove|set>"

messages:
  prefix: "&a&lMONEY &r"
  
  no_permission: "&cNon hai il permesso per eseguire questo comando."
  player_not_found: "&cGiocatore non trovato."
  invalid_number: "&cPer favore, inserisci un numero valido."
  too-many-arguments: "&cTroppi argomenti."
  insufficient_funds: "&cNon hai abbastanza {currency}."
  not_pay_self: "&cNon puoi pagare te stesso."

  balance: "{prefix}&fHai &a{balance}{symbol}&f."
  balance_other: "{prefix}&fIl giocatore possiede &a{balance}{symbol}&f."
  balance_set: "{prefix}&fHai impostato il bilancio di &e{player} &fa &a{amount}{symbol}&f."
  balance_added: "{prefix}&fHai dato &4{amount}{symbol}&f a &c{player}&f."
  balance_taken: "{prefix}&fHai rimosso &4{amount}{symbol}&f a &c{player}&f."
  balance_set_all: "{prefix}&fHai impostato il bilancio di tutti i giocatori online a &a{amount}{symbol}&f."
  balance_added_all: "{prefix}&fHai dato &4{amount} &ffragole a tutti i giocatori online."
  currency_received: "{prefix}&fHai ricevuto &a{amount}{symbol}&f da {player}."
  currency_removed: "{prefix}&fTi sono state rimosse &a{amount}{symbol}."
  currency_set_notification: "{prefix}&fLe tue fragole sono state impostate a &a{amount}{symbol}&f."