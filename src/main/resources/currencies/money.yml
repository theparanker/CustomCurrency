name: "money"
displayName: "&6Money"
symbol: ""

starting-balance: 1000
max-balance: 1000000

can-be-negative: false

commands:
  command: "money"
  pay:
    enabled: true
    usage: "&cUsa: /{command} pay <player> <amount>"
    permission: "money.pay"
    description: "Pay another player a specified amount of money."
  balance:
      enabled: true
      usage: "&cUsa: /{command} balance [player]"
      permission: "money.balance"
      description: "Check your balance or another player's balance."
      settings:
        allow-check-others: true
  admin:
    enabled: true
    permission: "money.admin"
    usage: "&cUsa: /{command} admin <check|give|giveall|remove|set>"

messages:
  prefix: "&a&lMONEY &r"
  
  no_permission: "&cYou do not have permission to execute this command."
  player_not_found: "&cPlayer not found."
  invalid_number: "&cPlease enter a valid number."
  too-many-arguments: "&cToo many arguments."
  insufficient_funds: "&cYou do not have enough {currency}."
  not_pay_self: "&cYou cannot pay yourself."
  player-cant-see-other-balances: "&cYou cannot view other players' balances."

  balance: "{prefix}&fYou have &a{balance}{symbol}&f."
  balance_other: "{prefix}&fThe player has &a{balance}{symbol}&f."
  balance_set: "{prefix}&fYou set &e{player}'s &fbalance to &a{amount}{symbol}&f."
  balance_added: "{prefix}&fYou gave &4{amount}{symbol}&f to &c{player}&f."
  balance_taken: "{prefix}&fYou removed &4{amount}{symbol}&f from &c{player}&f."
  balance_set_all: "{prefix}&fYou set the balance of all online players to &a{amount}{symbol}&f."
  balance_added_all: "{prefix}&fYou gave &4{amount}{symbol}&f to all online players."
  currency_received: "{prefix}&fYou received &a{amount}{symbol}&f from {player}."
  currency_removed: "{prefix}&fYou had &a{amount}{symbol} &fremoved."
  currency_set_notification: "{prefix}&fYour strawberries have been set to &a{amount}{symbol}&f."
